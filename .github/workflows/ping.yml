name: Keep Render Service Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL")
          echo "Response: $STATUS"
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}